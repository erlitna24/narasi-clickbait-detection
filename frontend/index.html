<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Narasi – Deteksi Clickbait Headline Indonesia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- ============ NAVBAR ============ -->
    <nav class="navbar">
      <div class="navbar-inner">
        <a href="/" class="logo">
          <img
            src="assets/logo.png"
            alt="Narasi"
            onerror="
              this.style.display = 'none';
              this.nextElementSibling.style.display = 'inline';
            "
          />
          <span class="logo-text logo-fallback" style="display: none"
            >Narasi</span
          >
        </a>
        <ul class="nav-links">
          <li><a href="/" class="nav-link active">Beranda</a></li>
          <li><a href="/tentang.html" class="nav-link">Tentang</a></li>
        </ul>
      </div>
    </nav>

    <!-- ============ HERO ============ -->
    <main class="main-content">
      <section class="hero">
        <h1 class="hero-title">
          Deteksi clickbait pada<br />headline Indonesia
        </h1>
        <p class="hero-subtitle">
          Masukkan judul berita untuk mengetahui apakah mengandung unsur
          clickbait atau tidak
        </p>
      </section>

      <!-- ============ SEARCH BOX ============ -->
      <div class="search-wrapper">
        <div class="search-container glass-card">
          <input
            type="text"
            id="headlineInput"
            class="search-input"
            placeholder="Masukkan judul berita..."
            autocomplete="off"
          />
          <button class="search-btn" id="searchBtn" aria-label="Cari">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="22"
              height="22"
              fill="none"
              viewBox="0 0 24 24"
              stroke="white"
              stroke-width="2.5"
            >
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
          </button>
        </div>
      </div>

      <!-- ============ RESULT CARD ============ -->
      <div id="resultSection" class="result-section" style="display: none">
        <div id="resultCard" class="result-card glass-card"></div>
      </div>

      <!-- ============ SEPARATOR ============ -->
      <div id="separator" class="separator" style="display: none"></div>

      <!-- ============ RIWAYAT ============ -->
      <div
        id="historySection"
        class="history-section glass-card"
        style="display: none"
      >
        <div class="history-header">
          <div class="history-title">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              fill="none"
              viewBox="0 0 24 24"
              stroke="#a855f7"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10" />
              <polyline points="12 6 12 12 16 14" />
            </svg>
            <span>Riwayat pencarian</span>
          </div>
          <button class="btn-hapus-semua" id="clearAllBtn">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="14"
              height="14"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <polyline points="3 6 5 6 21 6" />
              <path d="M19 6l-1 14H6L5 6" />
              <path d="M10 11v6M14 11v6" />
              <path d="M9 6V4h6v2" />
            </svg>
            Hapus semua
          </button>
        </div>
        <div id="historyList" class="history-list"></div>
      </div>
    </main>

    <script src="/script.js"></script>
  </body>
</html>
